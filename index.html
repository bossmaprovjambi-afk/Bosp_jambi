<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard BOSP Jambi 2026 - AUTO</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { background-color: #f1f5f9; }.card { background-color: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Dashboard Laporan BOSP Reguler SMA Provinsi Jambi Tahun 2026</h1>
  <p class="text-gray-500 mb-6">Update terakhir: <span id="lastUpdate">Loading...</span></p>
  
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card"><p class="text-gray-500 text-sm">Total Sekolah</p><p id="total" class="text-4xl font-bold">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">Sudah Kirim</p><p id="sudah" class="text-4xl font-bold text-green-600">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">Belum Kirim</p><p id="belum" class="text-4xl font-bold text-red-600">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">% Selesai</p><p id="persen" class="text-4xl font-bold text-blue-600">0%</p></div>
  </div>
</div>
<script>
  // GANTI LINK INI PAKE LINK PUBLIK CSV LU LUR
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?gid=147011660&single=true&output=csv'; 

  async function loadData() {
    try {
      const res = await fetch(SHEET_CSV_URL);
      const csvText = await res.text();
      const lines = csvText.trim().split('\n');
      const headers = lines.shift().split(',').map(h => h.trim());
      const idxStatus = headers.indexOf('STATUS KIRIM');
      const dataStatus = lines.map(l => l.split(',')[idxStatus]?.trim().replace(/"/g,''));
      
      const total = dataStatus.length;
      const sudah = dataStatus.filter(s => s?.toUpperCase() === 'SAMA').length;
      const belum = dataStatus.filter(s => s?.toUpperCase() === 'BELUM SAMA').length;
      const persen = total > 0? ((sudah / total) * 100).toFixed(1) : 0;

      document.getElementById('total').innerText = total;
      document.getElementById('sudah').innerText = sudah;
      document.getElementById('belum').innerText = belum;
      document.getElementById('persen').innerText = persen + '%';
      document.getElementById('lastUpdate').innerText = new Date().toLocaleString('id-ID');
    } catch(e) {
      document.getElementById('lastUpdate').innerText = 'Gagal load: Cek link publik';
      console.error(e);
    }
  }
  loadData();
</script>
</body>
</html>
