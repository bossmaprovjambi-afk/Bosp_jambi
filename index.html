<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BOSP Jambi 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
 .card { background-color: white; border-radius: 1rem; padding: 1.5rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
 .badge-sudah { background-color: #dcfce7; color: #166534; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
 .badge-belum { background-color: #fee2e2; color: #991b1b; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
 .row-clickable:hover { background-color: #eff6ff; cursor: pointer; }
 .row-active { background-color: #dbeafe!important; }
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
  <header class="flex justify-between items-center mb-6">
    <div><h1 class="text-2xl font-bold">Dashboard BOSP Jambi 2026</h1><p id="lastUpdate" class="text-gray-500 text-sm"></p></div>
    <button id="refreshBtn" class="bg-blue-600 text-white font-semibold px-4 py-2 rounded-lg">Refresh Data</button>
  </header>

  <div id="loader" class="text-center p-10 card"><p>Memuat data dari Google Sheet...</p></div>

  <div id="dashboard" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
      <div class="card"><p class="text-gray-500 text-sm">Total Sekolah</p><p id="totalSekolah" class="text-3xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-500 text-sm">Sudah Kirim</p><p id="sudahKirim" class="text-3xl font-bold text-green-600">0</p></div>
      <div class="card"><p class="text-gray-500 text-sm">Belum Kirim</p><p id="belumKirim" class="text-3xl font-bold text-red-600">0</p></div>
      <div class="card"><p class="text-gray-500 text-sm">% Terlaporkan</p><p id="persen" class="text-3xl font-bold text-blue-600">0%</p></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="card"><h3 class="font-bold mb-4">Progres</h3><canvas id="statusChart"></canvas></div>
      <div class="card lg:col-span-2">
        <input type="text" id="searchInput" placeholder="Cari Nama / NPSN..." class="w-full p-2 border rounded-lg mb-4">
        <div class="overflow-x-auto max-h-80"><table class="w-full text-sm"><thead><tr><th>NPSN</th><th>Nama</th><th>Kab/Kota</th><th>Status</th></tr></thead><tbody id="dataTable"></tbody></table></div>
      </div>
    </div>
    <div id="detailCard" class="card mt-6 hidden"><h3 id="detailTitle" class="text-xl font-bold mb-4"></h3><div id="detailBody" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div></div>
  </div>
</div>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?output=csv';
  
  let allData = [];
  let statusChart;

  async function fetchData() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    try {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      const [headerLine,...lines] = text.trim().split('\n');
      
      // RUMUS BARU: BACA NAMA KOLOM DULU, SPASI JADI _
      const headers = headerLine.split(',').map(h => h.trim().replace(/ /g, '_').toLowerCase());
      // Hasilnya: ['npsn', 'nama_sekolah', 'kab/kota', 'jenis', 'status_kirim']
      
      const idxNpsn = headers.indexOf('npsn');
      const idxNama = headers.indexOf('nama_sekolah');
      const idxKab = headers.indexOf('kab/kota');
      const idxJenis = headers.indexOf('jenis');
      const idxStatus = headers.indexOf('status_kirim'); // INI KUNCINYA LUR

      allData = lines.map(line => {
        const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
        return {
          npsn: cols[idxNpsn],
          nama: cols[idxNama],
          kabkota: cols[idxKab],
          jenis: cols[idxJenis],
          status: cols[idxStatus] // Ambil dari kolom STATUS KIRIM
        };
      }).filter(r => r.npsn);

      updateDashboard();
    } catch (error) {
      document.getElementById('loader').innerHTML = `<p class="text-red-600 font-bold">GAGAL: ${error.message}</p>`;
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }
  }

  function updateDashboard() {
    const sudah = allData.filter(d => d.status?.toUpperCase() === 'SAMA').length;
    const belum = allData.filter(d => d.status?.toUpperCase() === 'BELUM SAMA').length;
    const total = allData.length;
    const persen = total > 0? ((sudah / total) * 100).toFixed(1) : 0;

    document.getElementById('totalSekolah').innerText = total;
    document.getElementById('sudahKirim').innerText = sudah;
    document.getElementById('belumKirim').innerText = belum;
    document.getElementById('persen').innerText = persen + '%';
    document.getElementById('lastUpdate').innerText = `Update: ${new Date().toLocaleTimeString('id-ID')}`;
    
    document.getElementById('dataTable').innerHTML = allData.map(d => `
      <tr id="row-${d.npsn}" class="row-clickable" onclick="showDetail('${d.npsn}')">
        <td>${d.npsn}</td><td>${d.nama}</td><td>${d.kabkota}</td>
        <td><span class="${d.status?.toUpperCase() === 'SAMA'? 'badge-sudah' : 'badge-belum'}">${d.status}</span></td>
      </tr>
    `).join('');
    
    if(statusChart) statusChart.destroy();
    statusChart = new Chart(document.getElementById('statusChart'), { type: 'doughnut', data: { labels: ['Sudah Kirim', 'Belum Kirim'], datasets: [{ data: [sudah, belum], backgroundColor: ['#22c55e', '#ef4444'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } });
  }

  function showDetail(npsn) {
    document.querySelectorAll('#dataTable tr').forEach(tr => tr.classList.remove('row-active'));
    document.getElementById(`row-${npsn}`).classList.add('row-active');
    const d = allData.find(x => x.npsn === npsn);
    document.getElementById('detailTitle').innerText = d.nama;
    document.getElementById('detailBody').innerHTML = `
      <div><p class="text-gray-500 text-sm">NPSN</p><p class="font-semibold">${d.npsn}</p></div>
      <div><p class="text-gray-500 text-sm">Kab/Kota</p><p class="font-semibold">${d.kabkota}</p></div>
      <div><p class="text-gray-500 text-sm">Jenis</p><p class="font-semibold">${d.jenis}</p></div>
      <div><p class="text-gray-500 text-sm">STATUS KIRIM</p><p class="font-semibold">${d.status}</p></div>
    `;
    document.getElementById('detailCard').classList.remove('hidden');
    document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' });
  }

  document.getElementById('refreshBtn').onclick = fetchData;
  document.getElementById('searchInput').oninput = e => {
    const s = e.target.value.toLowerCase();
    const f = allData.filter(d => d.nama.toLowerCase().includes(s) || d.npsn.includes(s));
    document.getElementById('dataTable').innerHTML = f.map(d => `<tr id="row-${d.npsn}" class="row-clickable" onclick="showDetail('${d.npsn}')"><td>${d.npsn}</td><td>${d.nama}</td><td>${d.kabkota}</td><td><span class="${d.status?.toUpperCase() === 'SAMA'? 'badge-sudah' : 'badge-belum'}">${d.status}</span></td></tr>`).join('');
  };
  fetchData();
</script>
</body>
</html>
