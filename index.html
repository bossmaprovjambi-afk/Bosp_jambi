<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Laporan BOSP Reguler SMA Provinsi Jambi Tahun 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #f1f5f9; }
 .card { background-color: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
  
  /* INI KUNCINYA LUR: BEKUIN HEADER TABEL */
  thead th { 
    position: sticky; 
    top: 0; /* Nempel ke paling atas card */
    background: #f8fafc; /* Warna background biar gak transparan */
    z-index: 20; /* Biar di atas baris data */
    box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1); /* Kasih garis bayangan = pembatas */
  }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-7xl mx-auto">
  <h1 class="text-3xl font-bold mb-2">Dashboard Laporan BOSP Reguler SMA Provinsi Jambi Tahun 2026</h1>
  <p class="text-gray-500 mb-6">Update terakhir: <span id="lastUpdate">Loading...</span></p>
  
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card"><p class="text-gray-500 text-sm">Total Sekolah</p><p id="total" class="text-4xl font-bold">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">Sudah Kirim</p><p id="sudah" class="text-4xl font-bold text-green-600">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">Belum Kirim</p><p id="belum" class="text-4xl font-bold text-red-600">0</p></div>
    <div class="card"><p class="text-gray-500 text-sm">% Selesai</p><p id="persen" class="text-4xl font-bold text-blue-600">0%</p></div>
  </div>

  <div class="card mb-4"><input id="searchBox" type="text" placeholder="Cari NPSN, Nama Sekolah, atau Kabupaten..." class="w-full p-3 border rounded-lg"></div>

  <!-- KASIH max-h + overflow-y biar tabelnya bisa scroll sendiri -->
  <div class="card overflow-x-auto max-h-[70vh] overflow-y-auto">
    <table class="w-full text-sm">
      <thead><tr class="text-left text-gray-600 border-b">
        <th class="p-3">No</th><th class="p-3">NPSN</th><th class="p-3">Nama Sekolah</th>
        <th class="p-3">Status</th><th class="p-3">Kabupaten</th><th class="p-3">STATUS KIRIM</th><th class="p-3">Chat Whatsapp</th>
      </tr></thead>
      <tbody id="tabelBody"><tr><td colspan="7" class="p-6 text-center text-gray-400">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?gid=147011660&single=true&output=csv'; 
  let semuaData = [];
  function get(row, namaKolom) { const key = Object.keys(row).find(k => k.trim().toLowerCase() === namaKolom.trim().toLowerCase()); return row[key] || '-'; }
  function renderTabel(data) {
    const tbody = document.getElementById('tabelBody');
    if(data.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center">Data tidak ditemukan</td></tr>`; return; }
    tbody.innerHTML = '';
    data.forEach((row, i) => {
      const npsn = get(row, 'NPSN'); const nama = get(row, 'Nama Sekolah'); const jenis = get(row, 'Status');
      const kab = get(row, 'Kabupaten'); const statusKirim = get(row, 'STATUS KIRIM'); const noWa = get(row, 'No HP Kepala Sekolah');
      const statusWarna = statusKirim?.toUpperCase().includes('SAMA')? 'text-green-600 font-bold' : 'text-red-600 font-bold';
      const waLink = noWa!== '-'? `https://wa.me/62${noWa.replace(/\D/g,'').replace(/^0/, '')}?text=Halo ${nama}, Status BOSP 2026 Bapak/Ibu masih ${statusKirim}. Mohon segera diperbaiki.` : '#';
      tbody.innerHTML += `<tr class="border-b hover:bg-gray-50">
        <td class="p-3">${i + 1}</td><td class="p-3">${npsn}</td><td class="p-3 font-medium">${nama}</td>
        <td class="p-3">${jenis}</td><td class="p-3">${kab}</td><td class="p-3 ${statusWarna}">${statusKirim}</td>
        <td class="p-3">${noWa!== '-'? `<a href="${waLink}" target="_blank" class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs hover:bg-green-600">Chat</a>` : '-'}</td>
      </tr>`;
    });
  }
  async function loadData() {
    try {
      const res = await fetch(SHEET_CSV_URL);
      const csvText = await res.text();
      const lines = csvText.trim().split('\n');
      const headers = lines.shift().split(',').map(h => h.trim());
      semuaData = lines.map(l => { const cols = l.split(','); let obj = {}; headers.forEach((h, i) => { obj[h] = cols[i]?.trim().replace(/"/g,'') || ''; }); return obj; });
      const total = semuaData.length; const sudah = semuaData.filter(s => get(s, 'STATUS KIRIM').toUpperCase().includes('SAMA')).length;
      const belum = total - sudah; const persen = total > 0? ((sudah / total) * 100).toFixed(1) : 0;
      document.getElementById('total').innerText = total; document.getElementById('sudah').innerText = sudah;
      document.getElementById('belum').innerText = belum; document.getElementById('persen').innerText = persen + '%';
      document.getElementById('lastUpdate').innerText = new Date().toLocaleString('id-ID');
      renderTabel(semuaData);
    } catch(e) { document.getElementById('tabelBody').innerHTML = `<tr><td colspan="7" class="p-6 text-center text-red-500">Gagal load</td></tr>`; }
  }
  document.getElementById('searchBox').addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase();
    renderTabel(semuaData.filter(d => JSON.stringify(d).toLowerCase().includes(keyword)));
  });
  loadData();
</script>
</body>
</html>
