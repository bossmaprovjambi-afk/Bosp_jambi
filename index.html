<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BOSP Jambi 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
 .card { background-color: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 1.5rem; transition: all 0.3s; }
 .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
 .status-sudah { background-color: #d1fae5; color: #065f46; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
 .status-belum { background-color: #fee2e2; color: #991b1b; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800">Dashboard BOSP Jambi 2026</h1>
      <p class="text-gray-500">Monitoring Laporan Real-Time</p>
    </div>
    <button id="refreshBtn" class="mt-4 md:mt-0 bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg shadow-md hover:bg-blue-700 transition">Refresh Data</button>
  </header>

  <div id="loader" class="text-center p-10">
    <p class="text-lg text-gray-600">Memuat data dari Google Sheet...</p>
  </div>
  
  <div id="dashboard" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="card"><p class="text-gray-500">Total Sekolah</p><p id="totalSekolah" class="text-4xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-500">Sudah Kirim</p><p id="sudahKirim" class="text-4xl font-bold text-green-600">0</p></div>
      <div class="card"><p class="text-gray-500">Belum Kirim</p><p id="belumKirim" class="text-4xl font-bold text-red-600">0</p></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="card lg:col-span-1">
        <h3 class="font-bold text-lg mb-4">Progres Laporan</h3>
        <canvas id="statusChart"></canvas>
      </div>
      <div class="card lg:col-span-2">
        <h3 class="font-bold text-lg mb-4">Data Sekolah</h3>
        <input type="text" id="searchInput" placeholder="Cari Nama Sekolah / NPSN..." class="w-full p-2 border rounded-lg mb-4">
        <div class="overflow-x-auto max-h-96">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 sticky top-0"><tr><th>NPSN</th><th>Nama Sekolah</th><th>Kab/Kota</th><th>Status</th></tr></thead>
            <tbody id="dataTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // LINK GOOGLE SHEET LU YANG UDAH BENER 100%
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?output=csv';
  
  let allData = [];
  let statusChart;

  async function fetchData() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    try {
      const response = await fetch(SHEET_CSV_URL);
      const csvText = await response.text();
      const rows = csvText.split('\n').slice(1); // Hapus header
      allData = rows.map(row => {
        const cols = row.split(',');
        return {
          npsn: cols[0]?.trim(),
          nama: cols[1]?.trim(),
          kabkota: cols[2]?.trim(),
          jenis: cols[3]?.trim(),
          status: cols[4]?.trim().toUpperCase() // Biar SAMA / BELUM SAMA
        };
      }).filter(r => r.npsn); // Buang baris kosong
      updateDashboard();
    } catch (error) {
      alert('Gagal memuat data. Pastiin Sheet sudah "Siapa saja dengan link" ya lur.');
      console.error(error);
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }
  }

  function updateDashboard() {
    const sudah = allData.filter(d => d.status === 'SAMA').length;
    const belum = allData.filter(d => d.status === 'BELUM SAMA').length;
    const total = allData.length;

    document.getElementById('totalSekolah').innerText = total;
    document.getElementById('sudahKirim').innerText = sudah;
    document.getElementById('belumKirim').innerText = belum;

    renderTable(allData);
    renderChart(sudah, belum);
  }

  function renderTable(data) {
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = data.map(d => `
      <tr>
        <td>${d.npsn}</td>
        <td>${d.nama}</td>
        <td>${d.kabkota}</td>
        <td><span class="${d.status === 'SAMA'? 'status-sudah' : 'status-belum'}">${d.status}</span></td>
      </tr>
    `).join('');
  }
  
  function renderChart(sudah, belum) {
    const ctx = document.getElementById('statusChart').getContext('2d');
    if(statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Sudah Kirim', 'Belum Kirim'],
        datasets: [{ data: [sudah, belum], backgroundColor: ['#10B981', '#EF4444'] }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  document.getElementById('refreshBtn').addEventListener('click', fetchData);
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const search = e.target.value.toLowerCase();
    const filtered = allData.filter(d => d.nama.toLowerCase().includes(search) || d.npsn.includes(search));
    renderTable(filtered);
  });

  fetchData(); // Muat pertama kali
</script>
</body>
</html>
