<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Laporan BOSP Reguler SMA Provinsi Jambi Tahun 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<style>
.card { border-radius: 1rem; padding: 1.5rem; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
  thead th { position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.2); }
.bulan-icon { font-size: 14px; text-align: center; width: 24px; }
</style>
</head>
<body class="p-4 md:p-8 bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">
<div class="max-w-[1600px] mx-auto">

  <!-- HEADER RESMI + LOGO 3D JAMBI -->
  <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
    <div class="flex items-center gap-4 text-center md:text-left">
      <!-- LOGO KIRI: PAKE LINK LANGSUNG -->
      <img src="https://i.ibb.co/4p0YJz5V/sepucuk-jambi.png" alt="Logo Sepucuk Jambi" class="w-20 h-20 md:w-24 md:h-24 object-contain drop-shadow-lg bg-white p-1 rounded-lg">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Dashboard Laporan BOSP Reguler SMA</h1>
        <p class="text-lg md:text-xl font-semibold text-slate-600 dark:text-slate-300">Provinsi Jambi Tahun 2026</p>
        <p class="text-sm text-slate-500 dark:text-slate-400">Update terakhir: <span id="lastUpdate">Loading...</span></p>
      </div>
    </div>
    <button id="theme-toggle" class="p-3 rounded-full bg-white dark:bg-slate-800 shadow-md hover:scale-110 transition absolute top-4 right-4 md:static">
      <span id="theme-icon">🌙</span>
    </button>
  </div>
  
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="card bg-white dark:bg-slate-800"><p class="text-slate-500 dark:text-slate-400 text-sm">Total Sekolah</p><p id="total" class="text-4xl font-bold">0</p></div>
    <div class="card bg-white dark:bg-slate-800"><p class="text-slate-500 dark:text-slate-400 text-sm">Lengkap 12/12</p><p id="sudah" class="text-4xl font-bold text-green-600 dark:text-green-400">0</p></div>
    <div class="card bg-white dark:bg-slate-800"><p class="text-slate-500 dark:text-slate-400 text-sm">Belum Lengkap</p><p id="belum" class="text-4xl font-bold text-red-600 dark:text-red-400">0</p></div>
    <div class="card bg-white dark:bg-slate-800"><p class="text-slate-500 dark:text-slate-400 text-sm">% Selesai</p><p id="persen" class="text-4xl font-bold text-blue-600 dark:text-blue-400">0%</p></div>
  </div>

  <div class="card bg-white dark:bg-slate-800 mb-4"><input id="searchBox" type="text" placeholder="Cari NPSN, Nama Sekolah, atau Kabupaten..." class="w-full p-3 border rounded-lg bg-slate-50 dark:bg-slate-700 border-slate-300 dark:border-slate-600 placeholder-slate-400 dark:placeholder-slate-500"></div>

  <div class="card bg-white dark:bg-slate-800 overflow-x-auto max-h- overflow-y-auto">
    <table class="w-full text-sm"><thead><tr class="text-left text-slate-600 dark:text-slate-300 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800">
      <th class="p-3">No</th><th class="p-3">NPSN</th><th class="p-3">Nama Sekolah</th><th class="p-3">Status</th><th class="p-3">Kabupaten</th>
      <th class="p-3 text-center" title="Januari">J</th><th class="p-3 text-center" title="Februari">F</th><th class="p-3 text-center" title="Maret">M</th><th class="p-3 text-center" title="April">A</th><th class="p-3 text-center" title="Mei">M</th><th class="p-3 text-center" title="Juni">J</th><th class="p-3 text-center" title="Juli">J</th><th class="p-3 text-center" title="Agustus">A</th><th class="p-3 text-center" title="September">S</th><th class="p-3 text-center" title="Oktober">O</th><th class="p-3 text-center" title="Nopember">N</th><th class="p-3 text-center" title="Desember">D</th>
      <th class="p-3">STATUS</th><th class="p-3">WA</th>
    </tr></thead><tbody id="tabelBody"><tr><td colspan="19" class="p-6 text-center text-slate-400">Loading...</td></tr></tbody></table>
  </div>
</div>
<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?gid=147011660&single=true&output=csv'; 
  let semuaData = []; const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','Nopember','Desember'];
  
  const themeToggleBtn = document.getElementById('theme-toggle'); const themeIcon = document.getElementById('theme-icon'); const html = document.documentElement;
  if (localStorage.getItem('theme') === 'dark') { html.classList.add('dark'); themeIcon.textContent = '☀️'; } else { themeIcon.textContent = '🌙'; }
  themeToggleBtn.addEventListener('click', () => { html.classList.toggle('dark'); if (html.classList.contains('dark')) { localStorage.setItem('theme', 'dark'); themeIcon.textContent = '☀️'; } else { localStorage.setItem('theme', 'light'); themeIcon.textContent = '🌙'; } });

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines.shift().split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/^"|"$/g, '').trim());
    return lines.map(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
      return headers.reduce((obj, header, i) => { obj[header] = values[i] || ''; return obj; }, {});
    });
  }

  function get(row, namaKolom) { const key = Object.keys(row).find(k => k.trim().toLowerCase() === namaKolom.trim().toLowerCase()); return row[key] || ''; }

  function renderTabel(data) {
    const tbody = document.getElementById('tabelBody');
    if(data.length === 0) { tbody.innerHTML = `<tr><td colspan="19" class="p-6 text-center">Data tidak ditemukan</td></tr>`; return; }
    tbody.innerHTML = '';
    data.forEach((row, i) => {
      const npsn = get(row, 'NPSN'); const nama = get(row, 'Nama Sekolah'); const jenis = get(row, 'Status'); const kab = get(row, 'Kabupaten'); const noWa = get(row, 'No HP Kepala Sekolah');
      let sudahBulan = 0;
      const iconBulan = BULAN.map(b => { const val = get(row, b).toUpperCase().trim(); if(val === 'TRUE' || val === '1' || val.includes('SUDAH')) { sudahBulan++; return `<td class="bulan-icon text-green-600 dark:text-green-400" title="${b}: SUDAH KIRIM">✅</td>`; } else { return `<td class="bulan-icon text-slate-400 dark:text-slate-600" title="${b}: BELUM KIRIM">⏳</td>`; } }).join('');
      const waLink = noWa? `https://wa.me/62${noWa.replace(/\D/g,'').replace(/^0/, '')}?text=Halo ${nama}, Progress BOSP 2026 Bapak/Ibu baru ${sudahBulan}/12 bulan. Mohon segera dilengkapi.` : '#';
      tbody.innerHTML += `<tr class="border-b border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700"><td class="p-3">${i + 1}</td><td class="p-3">${npsn}</td><td class="p-3 font-medium whitespace-nowrap">${nama}</td><td class="p-3">${jenis}</td><td class="p-3 whitespace-nowrap">${kab}</td>${iconBulan}<td class="p-3 font-bold text-center">${sudahBulan}/12</td><td class="p-3">${noWa? `<a href="${waLink}" target="_blank" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg text-xs">Chat</a>` : '-'}</td></tr>`;
    });
  }
  
  async function loadData() {
    try {
      const res = await fetch(SHEET_CSV_URL); if(!res.ok) throw new Error('Link CSV Gagal');
      const csvText = await res.text();
      semuaData = parseCSV(csvText); 
      const total = semuaData.length; 
      const sudah = semuaData.filter(s => BULAN.filter(b => { const v=get(s,b).toUpperCase().trim(); return v==='TRUE'||v==='1'||v.includes('SUDAH'); }).length === 12).length;
      const belum = total - sudah; 
      const persen = total > 0? ((sudah / total) * 100).toFixed(1) : 0;
      document.getElementById('total').innerText = total; 
      document.getElementById('sudah').innerText = sudah; 
      document.getElementById('belum').innerText = belum; 
      document.getElementById('persen').innerText = persen + '%';
      document.getElementById('lastUpdate').innerText = new Date().toLocaleString('id-ID'); 
      renderTabel(semuaData);
    } catch(e) { 
      console.error(e);
      document.getElementById('tabelBody').innerHTML = `<tr><td colspan="19" class="p-6 text-center text-red-500">Gagal load: ${e.message}</td></tr>`; 
    }
  }
  
  let searchTimeout;
  document.getElementById('searchBox').addEventListener('input', (e) => {
    clearTimeout(searchTimeout); 
    searchTimeout = setTimeout(() => { 
      const keyword = e.target.value.toLowerCase();
      const hasilFilter = semuaData.filter(d => 
        get(d, 'NPSN').toLowerCase().includes(keyword) || 
        get(d, 'Nama Sekolah').toLowerCase().includes(keyword) || 
        get(d, 'Kabupaten').toLowerCase().includes(keyword)
      );
      renderTabel(hasilFilter);
    }, 300); 
  });

  loadData();
</script>
</body>
</html>
