<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BOSP Jambi 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
.card { background-color: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 1.5rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
.status-sudah { background-color: #d1fae5; color: #065f46; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
.status-belum { background-color: #fee2e2; color: #991b1b; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
.row-clickable:hover { background-color: #eff6ff; cursor: pointer; } /* Biar keliatan bisa diklik */
.modal-bg { background-color: rgba(0,0,0,0.5); }
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800">Dashboard BOSP Jambi 2026</h1>
      <p class="text-gray-500">Monitoring Laporan Real-Time</p>
    </div>
    <button id="refreshBtn" class="mt-4 md:mt-0 bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg shadow-md hover:bg-blue-700 transition">Refresh Data</button>
  </header>

  <div id="loader" class="text-center p-10"><p class="text-lg text-gray-600">Memuat data...</p></div>

  <div id="dashboard" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="card"><p class="text-gray-500">Total Sekolah</p><p id="totalSekolah" class="text-4xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-500">Sudah Kirim</p><p id="sudahKirim" class="text-4xl font-bold text-green-600">0</p></div>
      <div class="card"><p class="text-gray-500">Belum Kirim</p><p id="belumKirim" class="text-4xl font-bold text-red-600">0</p></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="card lg:col-span-1"><h3 class="font-bold text-lg mb-4">Progres Laporan</h3><canvas id="statusChart"></canvas></div>
      <div class="card lg:col-span-2">
        <h3 class="font-bold text-lg mb-4">Data Sekolah - Klik baris untuk detail</h3>
        <input type="text" id="searchInput" placeholder="Cari Nama Sekolah / NPSN..." class="w-full p-2 border rounded-lg mb-4">
        <div class="overflow-x-auto max-h-96">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 sticky top-0"><tr><th>NPSN</th><th>Nama Sekolah</th><th>Kab/Kota</th><th>Status</th></tr></thead>
            <tbody id="dataTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL POPUP DETAIL SEKOLAH -->
<div id="modal" class="fixed inset-0 modal-bg hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full m-4 relative">
    <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-2xl">&times;</button>
    <h2 id="modalTitle" class="text-2xl font-bold mb-4 text-gray-800"></h2>
    <div id="modalBody" class="space-y-3 text-gray-700"></div>
  </div>
</div>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?output=csv';

  let allData = [];
  let statusChart;

  async function fetchData() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    try {
      const response = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime()); // Anti cache
      const csvText = await response.text();
      const lines = csvText.split('\n');
      const headers = lines.shift().split(',').map(h => h.toLowerCase().trim().replace(/"/g, ''));

      allData = lines.map(line => {
        const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
        let obj = {};
        headers.forEach((h, i) => obj[h] = cols[i]); // Ambil semua kolom, gak cuma 5
        return obj;
      }).filter(r => r.npsn);

      updateDashboard();
    } catch (error) {
      alert('Gagal memuat data. Cek Google Sheet udah Public belum lur.');
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }
  }

  function updateDashboard() {
    const sudah = allData.filter(d => (d.status || d['status kirim'])?.toUpperCase() === 'SAMA').length;
    const belum = allData.filter(d => (d.status || d['status kirim'])?.toUpperCase() === 'BELUM SAMA').length;
    const total = allData.length;

    document.getElementById('totalSekolah').innerText = total;
    document.getElementById('sudahKirim').innerText = sudah;
    document.getElementById('belumKirim').innerText = belum;

    renderTable(allData);
    renderChart(sudah, belum);
  }

  function renderTable(data) {
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = data.map(d => `
      <tr class="row-clickable" onclick='showDetail(${JSON.stringify(d).replace(/'/g, "&#39;")})'>
        <td>${d.npsn}</td>
        <td>${d['nama sekolah'] || d.nama}</td>
        <td>${d['kab/kota'] || d.kabkota}</td>
        <td><span class="${(d.status || d['status kirim'])?.toUpperCase() === 'SAMA'? 'status-sudah' : 'status-belum'}">${d.status || d['status kirim']}</span></td>
      </tr>
    `).join('');
  }

  function renderChart(sudah, belum) {
    const ctx = document.getElementById('statusChart').getContext('2d');
    if(statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: ['Sudah Kirim', 'Belum Kirim'], datasets: [{ data: [sudah, belum], backgroundColor: ['#10B981', '#EF4444'] }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } }
    });
  }

  // FUNGSI POPUP
  function showDetail(data) {
    document.getElementById('modalTitle').innerText = data['nama sekolah'] || data.nama;
    let bodyHTML = '';
    for (const key in data) {
      if (data[key]) { // Cuma munculin yang ada isinya
        bodyHTML += `<div class="flex justify-between border-b pb-2"><span class="font-semibold capitalize">${key.replace(/_/g, ' ')}</span><span>${data[key]}</span></div>`;
      }
    }
    document.getElementById('modalBody').innerHTML = bodyHTML;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal').classList.remove('flex');
  }

  document.getElementById('refreshBtn').addEventListener('click', fetchData);
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const search = e.target.value.toLowerCase();
    const filtered = allData.filter(d => (d['nama sekolah'] || d.nama).toLowerCase().includes(search) || d.npsn.includes(search));
    renderTable(filtered);
  });
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', (e) => { if(e.target.id === 'modal') closeModal() }); // Klik luar ketutup

  fetchData();
</script>
</body>
</html>
