<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Laporan BOSP Reguler SMA Provinsi Jambi Tahun 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <style>
/* PALET WARNA SAGE GREEN BARU */
body { background-color: #DDEBD2; } /* Mint */
.card { border-radius: 0.75rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); background-color: #A3BFA3; } /* Sage Muda */
.bulan-icon { font-size: 14px; text-align: center; width: 24px; }

.btn-sage { background-color: #4A6F5A; color: #DDEBD2; font-weight: 600; }
.btn-sage:hover { background-color: #6E9B7F; }

.thead-sage { background-color: #4A6F5A; color: #DDEBD2; }

.text-sage { color: #4A6F5A; }
.border-sage { border-color: #A3BFA3; }

  #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #4A6F5A; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease-out; }
  #loading-screen img { width: 140px; animation: pulse-glow 1.8s infinite ease-in-out; }
  @keyframes pulse-glow { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px #6E9B7F); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 15px #6E9B7F); } }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background-color: #6E9B7F; border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: #6E9B7F #A3BFA3; }
  </style>
</head>

<body class="p-4 md:p-8 text-sage transition-colors duration-300">
  <div id="loading-screen"><img src="./logo-jambi.png" alt="Loading Sepucuk Jambi..."></div>

  <div class="max-w-[1600px] mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <div class="flex items-center gap-4 text-center md:text-left">
        <img src="./logo-jambi.png" alt="Logo Sepucuk Jambi" class="w-20 h-20 md:w-24 md:h-24 object-contain drop-shadow-lg rounded-lg">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold">Dashboard Laporan BOSP Reguler SMA</h1>
          <p class="text-lg md:text-xl font-semibold">Provinsi Jambi Tahun 2026</p>
          <p class="text-sm opacity-70">Update terakhir: <span id="lastUpdate">Loading...</span></p>
          <!-- TOMBOL TANPA ICON + WARNA SAGE -->
          <a href="./rekap.html" class="mt-2 inline-block btn-sage px-4 py-2 rounded-lg text-sm">Lihat Rekap Kabupaten</a>
        </div>
      </div>
      <button id="theme-toggle" class="p-3 rounded-full card shadow-md hover:scale-110 transition absolute top-4 right-4 md:static">
        <span id="theme-icon">🌙</span>
      </button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="card"><p class="opacity-70 text-sm">Total Sekolah</p><p id="total" class="text-4xl font-bold">0</p></div>
      <div class="card"><p class="opacity-70 text-sm">Lengkap 12/12</p><p id="sudah" class="text-4xl font-bold text-green-800">0</p></div>
      <div class="card"><p class="opacity-70 text-sm">Belum Lengkap</p><p id="belum" class="text-4xl font-bold text-red-700">0</p></div>
      <div class="card"><p class="opacity-70 text-sm">% Selesai</p><p id="persen" class="text-4xl font-bold text-blue-900">0%</p></div>
    </div>

    <div class="card mb-4"><input id="searchBox" type="text" placeholder="Cari NPSN, Nama Sekolah, atau Kabupaten..." class="w-full p-3 border rounded-lg bg-[#DDEBD2] border-sage placeholder-gray-600"></div>

    <div class="card overflow-x-auto max-h-[calc(100vh-340px)] overflow-y-auto my-2">
      <table class="w-full text-sm"><thead><tr class="text-left thead-sage border-b border-sage">
        <th class="p-3">No</th><th class="p-3">NPSN</th><th class="p-3">Nama Sekolah</th><th class="p-3">Status</th><th class="p-3">Kabupaten</th>
        <th class="p-3 text-center" title="Januari">J</th><th class="p-3 text-center" title="Februari">F</th><th class="p-3 text-center" title="Maret">M</th><th class="p-3 text-center" title="April">A</th><th class="p-3 text-center" title="Mei">M</th><th class="p-3 text-center" title="Juni">J</th><th class="p-3 text-center" title="Juli">J</th><th class="p-3 text-center" title="Agustus">A</th><th class="p-3 text-center" title="September">S</th><th class="p-3 text-center" title="Oktober">O</th><th class="p-3 text-center" title="Nopember">N</th><th class="p-3 text-center" title="Desember">D</th>
        <th class="p-3">STATUS</th><th class="p-3">WA</th>
      </tr></thead><tbody id="tabelBody"><tr><td colspan="19" class="p-6 text-center opacity-50">Loading...</td></tr></tbody></table>
    </div>
  </div>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?gid=147011660&single=true&output=csv';
  let semuaData = []; const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','Nopember','Desember'];

  const themeToggleBtn = document.getElementById('theme-toggle'); const themeIcon = document.getElementById('theme-icon'); const html = document.documentElement;
  if (localStorage.getItem('theme') === 'dark') { html.classList.add('dark'); themeIcon.textContent = '☀️'; document.body.style.backgroundColor = '#2d3a2e'; } else { themeIcon.textContent = '🌙'; document.body.style.backgroundColor = '#DDEBD2'; }
  themeToggleBtn.addEventListener('click', () => { html.classList.toggle('dark'); if (html.classList.contains('dark')) { localStorage.setItem('theme', 'dark'); themeIcon.textContent = '☀️'; document.body.style.backgroundColor = '#2d3a2e'; } else { localStorage.setItem('theme', 'light'); themeIcon.textContent = '🌙'; document.body.style.backgroundColor = '#DDEBD2'; } });

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines.shift().split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/^"|"$/g, '').trim());
    return lines.map(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
      return headers.reduce((obj, header, i) => { obj[header] = values[i] || ''; return obj; }, {});
    });
  }
  function get(row, namaKolom) { const key = Object.keys(row).find(k => k.trim().toLowerCase() === namaKolom.trim().toLowerCase()); return row[key] || ''; }

  function renderTabel(data) {
    const tbody = document.getElementById('tabelBody');
    if(data.length === 0) { tbody.innerHTML = `<tr><td colspan="19" class="p-6 text-center">Data tidak ditemukan</td></tr>`; return; }
    tbody.innerHTML = '';

    const sekarang = new Date();
    const bulanSekarangIndex = sekarang.getMonth();
    const bulanYangHarusSudah = BULAN.slice(0, bulanSekarangIndex);

    data.forEach((row, i) => {
      const npsn = get(row, 'NPSN'); const nama = get(row, 'Nama Sekolah'); const jenis = get(row, 'Status'); const kab = get(row, 'Kabupaten'); const noWa = get(row, 'No HP Kepala Sekolah');
      let sudahBulan = 0;

      const iconBulan = BULAN.map(b => {
        const val = get(row, b).toUpperCase().trim();
        if(val === 'TRUE' || val === '1' || val.includes('SUDAH')) {
          sudahBulan++;
          return `<td class="bulan-icon text-green-800" title="${b}: SUDAH KIRIM">✅</td>`;
        } else {
          return `<td class="bulan-icon opacity-40" title="${b}: BELUM KIRIM">⏳</td>`;
        }
      }).join('');

      let waLink = '#';
      if(noWa) {
        const bulanBelum = bulanYangHarusSudah.filter(b => {
          const v = get(row, b).toUpperCase().trim();
          return!(v==='TRUE'||v==='1'||v.includes('SUDAH'));
        });

        let pesan = `Halo ${nama}, ini dari Dinas Pendidikan Provinsi Jambi.`;
        if(bulanBelum.length > 0) {
          const listBulan = bulanBelum.join(', ');
          pesan += `\n\nUntuk Laporan BOSP 2026, s/d bulan ${BULAN[bulanSekarangIndex-1]} masih ada yg belum Bapak/Ibu kirim ya: ${listBulan}.\n\nMohon segera dilengkapi agar tidak menghambat penyaluran dana. Terima kasih.`;
        } else {
          pesan += `\n\nAlhamdulillah, Laporan BOSP 2026 Bapak/Ibu s/d bulan ${BULAN[bulanSekarangIndex-1]} sudah lengkap. Terima kasih.`;
        }
        waLink = `https://wa.me/62${noWa.replace(/\D/g,'').replace(/^0/, '')}?text=${encodeURIComponent(pesan)}`;
      }

      tbody.innerHTML += `<tr class="border-b border-sage hover:bg-[#6E9B7F]/20"><td class="p-3">${i + 1}</td><td class="p-3">${npsn}</td><td class="p-3 font-medium whitespace-nowrap">${nama}</td><td class="p-3">${jenis}</td><td class="p-3 whitespace-nowrap">${kab}</td>${iconBulan}<td class="p-3 font-bold text-center">${sudahBulan}/12</td><td class="p-3">${noWa? `<a href="${waLink}" target="_blank" class="btn-sage px-3 py-1 rounded-lg text-xs">Chat</a>` : '-'}</td></tr>`;
    });
  }

  async function loadData() {
    try {
      const res = await fetch(SHEET_CSV_URL); if(!res.ok) throw new Error('Link CSV Gagal');
      const csvText = await res.text();
      semuaData = parseCSV(csvText);
      const total = semuaData.length;
      const sudah = semuaData.filter(s => BULAN.filter(b => { const v=get(s,b).toUpperCase().trim(); return v==='TRUE'||v==='1'||v.includes('SUDAH'); }).length === 12).length;
      const belum = total - sudah;
      const persen = total > 0? ((sudah / total) * 100).toFixed(1) : 0;
      document.getElementById('total').innerText = total;
      document.getElementById('sudah').innerText = sudah;
      document.getElementById('belum').innerText = belum;
      document.getElementById('persen').innerText = persen + '%';
      document.getElementById('lastUpdate').innerText = new Date().toLocaleString('id-ID');
      renderTabel(semuaData);
    } catch(e) {
      console.error(e);
      document.getElementById('tabelBody').innerHTML = `<tr><td colspan="19" class="p-6 text-center text-red-700">Gagal load: ${e.message}</td></tr>`;
    }
  }

  let searchTimeout;
  document.getElementById('searchBox').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const keyword = e.target.value.toLowerCase();
      const hasilFilter = semuaData.filter(d =>
        get(d, 'NPSN').toLowerCase().includes(keyword) ||
        get(d, 'Nama Sekolah').toLowerCase().includes(keyword) ||
        get(d, 'Kabupaten').toLowerCase().includes(keyword)
      );
      renderTabel(hasilFilter);
    }, 300);
  });

  loadData();

  window.addEventListener('load', () => {
    const loadingScreen = document.getElementById('loading-screen');
    loadingScreen.style.opacity = '0';
    setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
  });
</script>
</body>
</html>
