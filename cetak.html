<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
  .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; } 
  h1 { text-align: center; }
  .btn-wrap { text-align: center; margin-bottom: 15px; }
  button { 
    padding: 14px 24px; 
    font-size: 16px; 
    cursor: pointer; 
    border: none; 
    border-radius: 6px; 
    background: #dc3545; 
    color: #fff; 
    font-weight: bold;
  }
  object { width: 100%; height: 90vh; border: 1px solid #ddd; } /* GANTI IFRAME JADI OBJECT */
  .info { text-align: center; color: #e63946; font-size: 14px; margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <h1>LAPORAN BKU JANUARI 2026 - UKURAN LEGAL</h1>
  
  <div class="btn-wrap">
    <button id="btn-print">KLIK DISINI UNTUK PRINT LEGAL</button>
  </div>

  <!-- GANTI IFRAME JADI OBJECT -->
  <object id="pdfViewer" type="application/pdf"></object> 
  <p class="info">1. Klik tombol merah > 2. Di dialog print, pilih `Legal` > 3. `Skala: Sesuaikan`</p>
</div>

<script>
  const PUB_ID = '2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc';
  const gidJan = '102046414'; 
  
  function getPdfLink() {
    const random = new Date().getTime(); 
    // KUNCI: LANGSUNG LINK PDF. TANPA viewer?embedded=true
    return `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gidJan}&single=true&output=pdf&rnd=${random}#toolbar=0&navpanes=0`; 
  }
  
  const btnPrint = document.getElementById('btn-print');
  const pdfViewer = document.getElementById('pdfViewer');

  // LANGSUNG LOAD PDF LEGAL KE OBJECT
  pdfViewer.data = getPdfLink();

  btnPrint.addEventListener('click', () => {
    // Buka PDF di tab baru biar printnya paling bersih
    const win = window.open(getPdfLink(), '_blank'); 
    setTimeout(() => { win.print(); }, 1500);
  });

</script>
</body>
</html>
