<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan Bulan - Dinas Jambi</title>
<style>
  :root{
    --navy:#00182A; --gold:#C6A942; --blue-active:#EFF6FF;
    --blue-line:#2563EB; --text:#334155; --text-muted:#64748B;
    --bg:#F8FAFC; --input-bg:#F1F5F9; --red:#DC2626;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh;}

  /* ===== SIDEBAR PUTIH FULL KAYAK FOTO ===== */
.sidebar{width:260px; background:#FFF; border-right:1px solid #E2E8F0; padding:24px 0; display:flex; flex-direction:column; flex-shrink:0;}
.sidebar-head{text-align:center; padding:0 20px 24px; border-bottom:1px solid #F1F5F9; margin-bottom:16px;}
.sidebar-head img{width:90px; height:auto; margin-bottom:16px;} /* Logo dari upload lu */
.sidebar-head h2{font-size:16px; font-weight:800; color:var(--navy); margin:0; line-height:1.3; text-transform:uppercase;}
.sidebar-head p{font-size:13px; color:var(--text-muted); margin:4px 0 0;}
.menu{list-style:none; padding:0; margin:0;}
.menu li a{display:flex; align-items:center; gap:14px; padding:14px 20px; color:var(--text-muted); text-decoration:none; font-size:15px; font-weight:500; border-left:4px solid transparent; transition:.2s;}
.menu li a:hover{background:#F8FAFC; color:var(--text);}
.menu li a.active{background:var(--blue-active); border-left:4px solid var(--blue-line); color:var(--blue-line); font-weight:700;}
.menu svg{width:22px; height:22px; flex-shrink:0;}

  /* ===== KONTEN KAN ===== */
.main{flex:1; padding:32px; overflow-y:auto;}
.card{background:#FFF; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,.06); padding:28px; max-width:600px; margin:0 auto; border-top:4px solid var(--gold);}
.card h1{font-size:22px; color:var(--navy); margin:0 0 4px; border-bottom:1px solid #E2E8F0; padding-bottom:12px;}
.card h2{font-size:18px; color:var(--text); margin:16px 0 20px; font-weight:600;}
.form-group{margin-bottom:16px;}
  label{font-size:13px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:6px;}
  input[type=text], select{width:100%; padding:12px; border:1px solid #CBD5E1; border-radius:8px; font-size:14px; background:var(--input-bg);}
  input:focus, select:focus{outline:none; border-bottom:2px solid var(--blue-line); box-shadow:0 0 0 3px rgba(37,99,235,.1);}

  /* ===== TOMBOL 3D HIJAU ===== */
.btn{width:100%; padding:14px 24px; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; transition: all.1s ease; box-shadow: 0 4px 0 #0A3D0A; background:#0A3D0A; color:#FFF; margin-top:10px;}
.btn:hover{background:#0F4F0F; transform:translateY(2px); box-shadow: 0 2px 0 #0A3D0A;}
.btn:active{transform:translateY(4px); box-shadow: 0 0 0 #0A3D0A;}
.btn:disabled{background:#94A3B8; box-shadow: 0 4px 0 #64748B; cursor:not-allowed;}

.alert{padding:12px; border-radius:8px; margin-top:16px; font-size:14px; font-weight:600; display:none;}
.alert.error{background:#FEE2E2; color:var(--red); border:1px solid #FCA5A5;}
.alert.success{background:#D1FAE5; color:#065F46; border:1px solid #6EE7B7;}

  @media print{.sidebar{display:none} body{background:#FFF}.main{padding:0}}
  @media (max-width: 768px){.sidebar{display:none}} /* Mobile disembunyikan dulu */
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-head">
      <!-- LOGO DARI UPLOAD LU -->
      <img src="An-QysHkxunXZ5FU5wURVbDSaYahPlsWm1VOHLBfpExCJ2hJZzv_gPz2mMH0QzcMx0XbDdXMedsalheoDFdM5sWj-lTpT0fTcvC5x4CqtMFTSYGrefXfhCe3" alt="Logo Jambi">
      <h2>DINAS PENDIDIKAN<br>PROVINSI JAMBI</h2>
      <p>Bidang Pembinaan SMA</p>
    </div>
    <ul class="menu">
      <li><a href="#" class="active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Status Kirim</a></li>
      <li><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Laporan BKU</a></li>
      <li><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>Notifications</a></li>
      <li><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2.89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>Rkas Awal</a></li>
      <li><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>Stats</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="card">
      <h1>Cetak Laporan Bulan</h1>
      <h2>Dashboard Utama</h2>

      <div class="form-group">
        <label for="npsn">Masukkan NPSN Sekolah</label>
        <input type="text" id="npsn" placeholder="Contoh: 10504558">
      </div>

      <div class="form-group">
        <label for="bulan">Pilih Bulan Cetak</label>
        <select id="bulan">
          <option value="">-- Pilih Bulan --</option>
          <option value="JAN26">Januari 2026</option><option value="FEB26">Februari 2026</option>
          <option value="MAR26">Maret 2026</option><option value="APR26">April 2026</option>
          <option value="MEI26">Mei 2026</option><option value="JUN26">Juni 2026</option>
          <option value="JUL26">Juli 2026</option><option value="AGT26">Agustus 2026</option>
          <option value="SEP26">September 2026</option><option value="OKT26">Oktober 2026</option>
          <option value="NOV26">November 2026</option><option value="DES26">Desember 2026</option>
        </select>
      </div>

      <button class="btn" id="btnCek" onclick="cekDanCetak()">CEK & CETAK LAPORAN</button>

      <div id="alertBox" class="alert"></div>
      <div id="areaCetak" style="display:none;"></div>
    </div>
  </main>

<script>
const CSV_DATA_MASUK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?gid=102046414&single=true&output=csv';
let dataSekolah = [];
async function loadCSV(url){
  const res = await fetch(url); const text = await res.text(); const rows = text.trim().split('\n');
  const headers = rows[0].split(',').map(h => h.trim().replace(/"/g,''));
  return rows.slice(1).map(r => { const values = r.split(','); let obj = {}; headers.forEach((h,i) => { obj[h] = values[i]? values[i].trim().replace(/"/g,'') : ''; }); return obj; });
}
function showAlert(pesan, tipe='error'){ const box = document.getElementById('alertBox'); box.className = `alert ${tipe}`; box.textContent = pesan; box.style.display = 'block'; }
async function cekDanCetak(){
  const npsnInput = document.getElementById('npsn').value.trim(); const bulan = document.getElementById('bulan').value; const btn = document.getElementById('btnCek');
  document.getElementById('alertBox').style.display = 'none'; if(!npsnInput ||!bulan){ showAlert('NPSN dan Bulan wajib diisi lur!'); return; }
  btn.disabled = true; btn.textContent = 'CEK DATA...';
  try{
    if(dataSekolah.length === 0){ dataSekolah = await loadCSV(CSV_DATA_MASUK); }
    const sekolah = dataSekolah.find(row => String(row.NPSN).trim() === npsnInput);
    if(!sekolah){ showAlert(`NPSN ${npsnInput} TIDAK TERDAFTAR di Data Masuk lur.`); btn.disabled = false; btn.textContent = 'CEK & CETAK LAPORAN'; return; }
    showAlert(`NPSN ${npsnInput} - ${sekolah['NAMA SEKOLAH'] || 'Sekolah'} DITEMUKAN. Siap cetak ${bulan}.`, 'success');
    document.getElementById('areaCetak').innerHTML = `<h2 style="text-align:center;">LAPORAN REALISASI BOSP ${bulan}</h2><p><b>NPSN:</b> ${npsnInput}</p><p><b>NAMA SEKOLAH:</b> ${sekolah['NAMA SEKOLAH'] || '-'}</p>`;
    document.getElementById('areaCetak').style.display = 'block'; window.print();
  }catch(e){ showAlert('Gagal ambil data. Cek F12 > Console lur.'); console.error(e); }
  btn.disabled = false; btn.textContent = 'CEK & CETAK LAPORAN';
}
</script>

</body>
</html>
