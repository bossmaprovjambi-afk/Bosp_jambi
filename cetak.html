<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP - LEGAL</title>
<style>
  body { 
    margin: 0; 
    background: #f4f4f4; 
    font-family: Arial, sans-serif; 
  }
  .wrap { 
    max-width: 1200px; 
    margin: 20px auto; 
    background: #fff; 
    padding: 20px; 
    border-radius: 8px; 
    box-shadow: 0 2px 5px #ccc; 
  }
  h1 { 
    text-align: center; 
    margin: 0 0 15px 0; 
    font-size: 22px;
  }
  .btn { 
    text-align: center; 
    margin-bottom: 15px; 
  }
  button { 
    padding: 14px 24px; 
    font-size: 16px; 
    cursor: pointer; 
    border: none; 
    border-radius: 6px; 
    background: #dc3545; 
    color: #fff; 
    font-weight: bold;
    transition: 0.2s;
  }
  button:hover {
    background: #b02a37;
  }
  object { 
    width: 100%; 
    height: 88vh; 
    border: 1px solid #ddd; 
    border-radius: 4px;
  }
  .info { 
    text-align: center; 
    color: #e63946; 
    font-size: 13px; 
    margin-top: 10px; 
    font-weight: bold; 
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>LAPORAN BKU JANUARI 2026</h1>
  
  <div class="btn">
    <button onclick="window.open('januari.pdf','_blank')">KLIK UNTUK PRINT LEGAL 1 HALAMAN</button>
  </div>

  <!-- KUNCI: LANGSUNG LOAD FILE PDF LOKAL -->
  <object type="application/pdf" data="januari.pdf#toolbar=0&navpanes=0&scrollbar=0"></object> 
  
  <p class="info">
    1. Pastiin `januari.pdf` ada di folder yang sama 
    <br>2. Pas Print pilih `Ukuran Kertas: Legal` + `Skala: Sesuaikan`
  </p>
</div>
</body>
</html>
