<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mencetak Laporan...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #525659; }
    #pdf-frame { width: 100%; height: 100%; border: none; }
    #topbar {
      position: fixed; top: -60px; left: 0; width: 100%; height: 60px;
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
      color: white; display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; transition: top 0.4s ease-in-out; z-index: 100;
    }
    body:hover #topbar { top: 0; }
    @media print { #topbar { display: none!important; } body { background-color: white; }
    #pdf-frame { opacity: 0; transform: scale(0.98) translateY(20px); animation: fadeInUp 0.8s ease-out forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: scale(1) translateY(0); }
  </style>
</head>
<body>
  <div id="topbar">
    <h1 id="judulCetak" class="text-lg font-bold">Loading...</h1>
    <div class="flex gap-3">
      <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg font-semibold text-sm">🖨️ Print</button>
      <button onclick="window.close()" class="bg-slate-600 hover:bg-slate-700 px-5 py-2 rounded-lg font-semibold text-sm">✖ Tutup</button>
    </div>
  </div>
  <iframe id="pdf-frame" src=""></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const gid = params.get('gid');
  const namaBulan = params.get('bulan') || 'BKU';

  const PUB_ID = '2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc';
  
  // LINK PDF ASLI DARI GSheet
  const pdfLinkAsli = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gid}&single=true&output=pdf`;
  
  // KITA BUNGKUS PAKE GOOGLE VIEWER BIAR NAMPIL, GAK DOWNLOAD
  const pdfUrl = `https://docs.google.com/viewer?embedded=true&url=${encodeURIComponent(pdfLinkAsli)}`;

  if(gid) {
    document.getElementById('pdf-frame').src = pdfUrl;
    document.getElementById('judulCetak').innerText = `LAPORAN BKU ${namaBulan.toUpperCase()} 2026`;
    document.title = `LAPORAN BKU ${namaBulan.toUpperCase()} 2026`;
  } else {
    document.body.innerHTML = `<div class="flex h-screen items-center justify-center text-white text-2xl">Error: GID tidak ditemukan</div>`;
  }
</script>
</body>
</html>
