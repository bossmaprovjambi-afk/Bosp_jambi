<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  :root { 
    --hijau-dinas: #0A3D0A; 
    --emas: #D4AF37;       
    --emas-gelap: #B8860B;
    --biru-navy: #0D1B2A;   
  }
  body { 
    margin: 0; 
    background: linear-gradient(135deg, var(--biru-navy) 0%, #1B263B 100%); 
    font-family: 'Segoe UI', 'Poppins', Arial, sans-serif; 
    padding: 20px;
  }
  .wrap { 
    text-align: center; 
    background: #fff; 
    padding: 35px 40px; 
    border-radius: 16px; 
    box-shadow: 0 12px 35px rgba(0,0,0,0.4); 
    border-top: 8px solid var(--hijau-dinas);
    max-width: 900px;
    margin: 20px auto;
  }
  .kop {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 3px solid var(--hijau-dinas);
    text-align: left;
  }
  .kop img {
    width: 65px;
    height: 65px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
  }
  .kop-tengah h1 { 
    margin: 0; 
    color: var(--hijau-dinas); 
    font-size: 19px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .kop-tengah p { margin: 3px 0 0 0; color: #444; font-size: 13px; font-weight: 600; }
  .sub { color: #6c757d; font-size: 14px; margin-bottom: 28px; font-weight: 500; }
  
  button { 
    padding: 16px 34px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; 
    background: linear-gradient(180deg, var(--emas) 0%, var(--emas-gelap) 100%);
    color: var(--biru-navy); 
    font-weight: 800;
    text-transform: uppercase;
    box-shadow: 0 6px 0 var(--emas-gelap), 0 8px 15px rgba(0,0,0,0.3);
    transition: all 0.1s ease;
  }
  button:hover { transform: translateY(2px); box-shadow: 0 4px 0 var(--emas-gelap), 0 6px 12px rgba(0,0,0,0.3); }
  button:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--emas-gelap), 0 2px 5px rgba(0,0,0,0.2); }
  
  .pdf-box {
    margin-top: 25px;
    border: 3px solid var(--hijau-dinas);
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }
  .pdf-box iframe {
    width: 100%;
    height: 80vh;
    border: none;
  }
  .info { 
    color: #333; 
    font-size: 12px; 
    margin-top: 22px; 
    font-weight: 600;
    background: #f8f9fa;
    padding: 12px;
    border-radius: 8px;
    border-left: 5px solid var(--hijau-dinas);
  }
</style>
</head>
<body>
<div class="wrap">
  
  <div class="kop">
    <img src="attachment://0" alt="Logo Provinsi Jambi">
    <div class="kop-tengah">
      <h1>LAPORAN REALISASI BOSP</h1>
      <p>SMAS NASIONAL SARIPUTRA</p>
      <p>KOTA JAMBI</p>
    </div>
  </div>

  <p class="sub">TAHUN ANGGARAN 2026 | BULAN JANUARI</p>
  
  <button onclick="tampilkanPDF()">🖨️ LIHAT & CETAK PDF LEGAL</button>
  
  <div class="pdf-box" id="pdfViewer">
    <!-- LINK PDF UKURAN DIKUNCI DI SINI. JANGAN DIUBAH LUR -->
    <iframe src="https://docs.google.com/viewer?embedded=true&url=https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2&printtitle=false&gridlines=false&fzr=false&AT_RP=min"></iframe>
  </div>
  
  <div class="info">
    ✅ Ukuran: Legal 8.5x14 | 1 Halaman | Fit to Width | DIKUNCI
  </div>
</div>

<script>
function tampilkanPDF() {
  document.getElementById('pdfViewer').style.display = 'block';
  document.getElementById('pdfViewer').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
