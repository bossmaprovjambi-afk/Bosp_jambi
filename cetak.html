<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  body { 
    margin: 0; 
    background: #f4f4f4; 
    font-family: 'Segoe UI', Arial, sans-serif; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .wrap { 
    text-align: center; 
    background: #fff; 
    padding: 40px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
  }
  h1 { margin: 0 0 25px 0; color: #212529; font-size: 22px; }
  button { 
    padding: 18px 32px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; 
    background: #28a745; color: #fff; font-weight: bold;
    box-shadow: 0 4px 8px rgba(40,167,69,0.3); transition: 0.2s;
  }
  button:hover { background: #218838; transform: scale(1.03); }
  .info { color: #6c757d; font-size: 13px; margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>
<div class="wrap">
  <h1>LAPORAN BKU JANUARI 2026</h1>
  
  <!-- KUNCI PAS: scale=2 + AT_RP=min -->
  <a href="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2&printtitle=false&gridlines=false&fzr=false&AT_RP=min" target="_blank">
    <button>🖨️ CETAK PDF LEGAL 1 HALAMAN</button>
  </a>
  
  <p class="info">
    ✅ Ukuran Legal 8.5x14 | ✅ Auto Fit Pas Tengah
  </p>
</div>
</body>
</html>
