<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  body { margin: 0; background: #f4f4f4; font-family: 'Segoe UI', Arial, sans-serif; }
  .wrap { max-width: 900px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h1 { text-align: center; margin: 0 0 15px 0; color: #212529; font-size: 20px; }
  .btn { text-align: center; margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; }
  button { 
    padding: 12px 20px; 
    font-size: 15px; 
    cursor: pointer; 
    border: none; 
    border-radius: 8px; 
    color: #fff; 
    font-weight: bold;
    transition: 0.2s;
  }
  .print { background: #28a745; } /* HIJAU */
  .print:hover { background: #218838; }
  .close { background: #dc3545; } /* MERAH */
  .close:hover { background: #c82333; }
  iframe { 
    width: 100%; 
    height: 75vh; 
    border: 1px solid #ddd; 
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>LAPORAN BKU JANUARI 2026</h1>
  
  <div class="btn">
    <!-- TOMBOL 1: PRINT -->
    <button class="print" onclick="window.print()">🖨️ PRINT</button>
    
    <!-- TOMBOL 2: TUTUP -->
    <button class="close" onclick="window.close()">❌ TUTUP</button>
  </div>

  <!-- PREVIEW PDF LANGSUNG -->
  <iframe src="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.25&bottom_margin=0.25&left_margin=0.25&right_margin=0.25&printtitle=false&gridlines=false&fzr=false#toolbar=0&navpanes=0&zoom=FitH"></iframe> 
  
</div>
</body>
</html>
