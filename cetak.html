<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  :root { 
    --hijau-dinas: #0A3D0A; 
    --emas: #D4AF37;       
    --emas-gelap: #B8860B;
    --biru-navy: #0D1B2A;   
  }
  body { 
    margin: 0; 
    background: linear-gradient(135deg, var(--biru-navy) 0%, #1B263B 100%); 
    font-family: 'Segoe UI', 'Poppins', Arial, sans-serif; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { 
    text-align: center; 
    background: #fff; 
    padding: 35px 40px; 
    border-radius: 16px; 
    box-shadow: 0 12px 35px rgba(0,0,0,0.4); 
    border-top: 8px solid var(--hijau-dinas);
    max-width: 520px;
  }
  /* KOP SURAT LOGO KIRI DOANG */
  .kop {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 3px solid var(--hijau-dinas);
    text-align: left;
  }
  .kop img {
    width: 65px;
    height: 65px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .kop-tengah h1 { 
    margin: 0; 
    color: var(--hijau-dinas); 
    font-size: 19px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .kop-tengah p {
    margin: 3px 0 0 0;
    color: #444;
    font-size: 13px;
    font-weight: 600;
  }
  .sub {
    color: #6c757d;
    font-size: 14px;
    margin-bottom: 28px;
    font-weight: 500;
  }
  /* TOMBOL 3D BENERAN */
  button { 
    padding: 16px 34px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; 
    background: linear-gradient(180deg, var(--emas) 0%, var(--emas-gelap) 100%);
    color: var(--biru-navy); 
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    /* EFEK 3D */
    box-shadow: 
      0 6px 0 var(--emas-gelap), /* Bayangan bawah tebal */
      0 8px 15px rgba(0,0,0,0.3); /* Bayangan luar */
    transition: all 0.1s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--emas);
  }
  button:hover { 
    transform: translateY(2px); 
    box-shadow: 
      0 4px 0 var(--emas-gelap),
      0 6px 12px rgba(0,0,0,0.3);
  }
  button:active {
    transform: translateY(6px); /* Keteken ke dalem */
    box-shadow: 
      0 0px 0 var(--emas-gelap),
      0 2px 5px rgba(0,0,0,0.2);
  }
  .info { 
    color: #333; 
    font-size: 12px; 
    margin-top: 22px; 
    font-weight: 600;
    background: #f8f9fa;
    padding: 12px;
    border-radius: 8px;
    border-left: 5px solid var(--hijau-dinas);
    display: flex;
    justify-content: center;
    gap: 15px;
  }
  .info span { display: flex; align-items: center; gap: 5px; }
</style>
</head>
<body>
<div class="wrap">
  
  <!-- KOP SURAT LOGO PROVINSI KIRI DOANG -->
  <div class="kop">
    <img src="attachment://0" alt="Logo Provinsi Jambi"> <!-- LOGO LU -->
    
    <div class="kop-tengah">
      <h1>LAPORAN REALISASI BOSP</h1>
      <p>SMAS NASIONAL SARIPUTRA</p>
      <p>KOTA JAMBI</p>
    </div>
  </div>

  <p class="sub">TAHUN ANGGARAN 2026 | BULAN JANUARI</p>
  
  <!-- LINK PDF 1 HALAMAN PAS -->
  <a href="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2&printtitle=false&gridlines=false&fzr=false&AT_RP=min" target="_blank">
    <button>🖨️ CETAK PDF LEGAL</button>
  </a>
  
  <div class="info">
    <span>✅ Ukuran Legal 8.5x14</span> 
    <span>✅ Fit to Width</span> 
    <span>✅ 1 Halaman</span>
  </div>
</div>
</body>
</html>
